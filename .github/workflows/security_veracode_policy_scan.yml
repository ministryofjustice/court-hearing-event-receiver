name: Security veracode policy scan
on:
  workflow_dispatch:
  schedule:
    - cron: "53 5 * * 1" # Every Monday at 05:53 UTC
jobs:
  security-veracode-policy-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security veracode policy scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_policy_scan.yml@9ca13a4dd43887df0d0c024e5781d6ec49343d33 # v2.14.6
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
