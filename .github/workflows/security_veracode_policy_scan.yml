name: Security veracode policy scan
on:
  workflow_dispatch:
  schedule:
    - cron: "53 5 * * 1" # Every Monday at 05:53 UTC
jobs:
  security-veracode-policy-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security veracode policy scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_policy_scan.yml@be0bda171344a1d3bd92fc8ce945a0204cbac33b # v2.14.10
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
