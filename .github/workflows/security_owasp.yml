name: Security OWASP dependency check
on:
  workflow_dispatch:
  schedule:
    - cron: "11 5 * * MON-FRI" # Every weekday at 05:11 UTC
jobs:
  security-kotlin-owasp-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Kotlin security OWASP dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_owasp.yml@d5f8cbb8085f8174be87bc5e2f4b610e785d984f # v2.14.11
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
