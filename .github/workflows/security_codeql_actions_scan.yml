name: Security CodeQL actions scan
on:
  workflow_dispatch:
  schedule:
    - cron: "11 5 * * MON-FRI" # Every weekday at 05:11 UTC
jobs:
  security-codeql-actions-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security CodeQL actions scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_codeql_actions.yml@8de783c7b6dc61ad8ba384924dc1fe93098d9995 # v2.13.1
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
