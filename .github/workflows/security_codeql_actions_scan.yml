name: Security CodeQL actions scan
on:
  workflow_dispatch:
  schedule:
    - cron: "11 5 * * MON-FRI" # Every weekday at 05:11 UTC
jobs:
  security-codeql-actions-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security CodeQL actions scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_codeql_actions.yml@255709aa1349e6ec1d77b3fec0ed6cbe9f962973 # v2.14.1
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
